          - name: ingestion_timestamp
            description: Raw ingestion timestamp used for freshness and volume anomaly monitoring.
            tests:
              - not_null
          - name: case_id
            description: Parent legacy case.
            tests:
              - not_null
          - name: status
            description: Recommender workflow status.
            tests:
              - not_null
          - name: created_at
            description: Operational recommender creation timestamp.
            tests:
              - not_null

  - name: amplitude
    schema: raw_amplitude
    description: >
      Assumed Amplitude landing table with one row per event and a JSONB
      `event_properties` payload. The raw landing table is assumed to include
      string-form `event_time` and `ingestion_timestamp` fields; staging parses
      them into typed timestamps. In production, the ingestion timestamp should
      be either warehouse-native timestamp or consistently ISO-formatted text so
      source freshness and Elementary volume checks can evaluate it safely.
    tables:
      - name: events
        description: Assumed raw Amplitude export for the case workflow feature.
        config:
          loaded_at_field: ingestion_timestamp
          freshness:
            error_after: {count: 30, period: hour}
        data_tests:
          - elementary.schema_changes:
              config:
                severity: warn
                store_failures: true
          - elementary.volume_anomalies:
              name: raw_amplitude_events_volume_anomalies
              arguments:
                timestamp_column: ingestion_timestamp
                anomaly_direction: both
                time_bucket: {period: day, count: 1}
                training_period: {period: day, count: 28}
                detection_period: {period: day, count: 1}
                anomaly_sensitivity: 3
                fail_on_zero: true
                seasonality: day_of_week
              config:
                severity: warn
                store_failures: true
        columns:
          - name: event_time
            description: Raw text timestamp for when the user action or system event occurred.
            tests:
              - not_null
          - name: ingestion_timestamp
            description: Raw text ingestion timestamp used for freshness and volume anomaly monitoring.
            tests:
              - not_null
          - name: event_type
            description: Event name such as `cw_task_plugin_opened`.
            tests:
              - not_null
          - name: event_properties
            description: JSONB payload with case/task/plugin metadata.
            tests:
              - not_null
